# Panoptes v0.1 local stack (spec `## Local run & IaC contract`).
#
# `docker compose up --build` brings up the full pipeline on a laptop, pointed at
# the operator's observed `dev` env: VictoriaMetrics (the metric store) + Grafana
# (the human face) + the collector (fetch → normalize → store) + the MCP stdio
# server (the LLM face). Zero cloud cost; the SAME compose file is what the v0.2
# Terraform host will run, so local and deployed stacks are identical.
#
# `collector` and `mcp` share a BAKED image built from the repo `Dockerfile`: it
# does a build-time `pip install .` (writable context → egg_info succeeds, unlike
# the old `:ro`-source runtime install) and `COPY core ./core`, so deps + source
# are in the image. No runtime pip, no source bind mount — restarts are fast and
# offline. `--build` is needed on first run and after any `core/` edit (Compose
# rebuilds the changed source layer; the dependency layer stays cached).
#
# Consumer-pack injection (spec § Consumer-pack loading): the consumer's pack dir is
# bind-mounted READ-ONLY at /packs/consumer; `PANOPTES_CONSUMER_PACK` points the MCP
# server at the mounted pack.py, and the Grafana provisioning globs /packs/consumer's
# dashboards alongside the core packs. `CONSUMER_PACK_DIR` defaults to the in-repo
# brand-neutral demo pack (see .env.example); a real consumer points it at its own
# repo dir. `${CONSUMER_PACK_DIR:?}` fails fast with a clear error if it is unset.
# The pack is the ONLY thing still mounted into collector/mcp — core code is baked.
#
# Secrets (AWS profile/role, Sentry token, health URL) come from the operator's
# .env — never inlined here. CI is hermetic and does NOT run this compose file; the
# integration suite spins ephemeral VictoriaMetrics + Grafana containers directly
# (see tests/integration/conftest.py) with synthetic data only (Risk R10).

# Shared build spec for the two Python services (collector + mcp) — both run the
# same baked image, so anchor the build block once and merge it into each.
x-panoptes-build: &panoptes-build
  build:
    context: .
    dockerfile: Dockerfile

services:
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.103.0
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=${VM_RETENTION:-15d}"
    ports:
      - "${VM_HOST_PORT:-8428}:8428"
    volumes:
      # Named volume so metric data survives a `docker compose down` (without -v).
      - vm-data:/storage
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:11.2.0
    depends_on:
      - victoriametrics
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      # Resolved inside the provisioning YAMLs (datasource.yaml -> ${VM_URL},
      # dashboards.yaml -> ${PANOPTES_PROVISIONING_DIR}). The datasource targets the
      # in-network VictoriaMetrics Prometheus-compatible endpoint.
      VM_URL: "http://victoriametrics:8428"
      PANOPTES_PROVISIONING_DIR: "/var/lib/grafana/dashboards"
      # Read-only monitoring surface: no anonymous-org edit, no sign-up.
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      # Core provisioning config (datasource + dashboards provider definitions).
      - ./core/dashboards/provisioning/datasource.yaml:/etc/grafana/provisioning/datasources/panoptes.yaml:ro
      - ./core/dashboards/provisioning/dashboards.yaml:/etc/grafana/provisioning/dashboards/panoptes.yaml:ro
      # Tier-1 core dashboard packs (errors-sentry / logs / overview).
      - ./core/dashboards:/var/lib/grafana/dashboards/core:ro
      # Tier-2 injected consumer pack (the demo by default) — its dashboards/**.json
      # is globbed by Grafana's file provider alongside the core packs. This is the
      # mount-injection path the integration test proves.
      - ${CONSUMER_PACK_DIR:?Set CONSUMER_PACK_DIR (see .env.example)}:/var/lib/grafana/dashboards/consumer:ro
    restart: unless-stopped

  collector:
    # Baked image (see Dockerfile): deps + core/ source are built in, WORKDIR=/app.
    <<: *panoptes-build
    depends_on:
      - victoriametrics
    # Only the consumer pack is mounted now — core code lives in the image.
    volumes:
      - ${CONSUMER_PACK_DIR:?Set CONSUMER_PACK_DIR (see .env.example)}:/packs/consumer:ro
    environment:
      PANOPTES_CONFIG: "/packs/consumer/panoptes.yaml"
      # Observed-env read credentials + endpoints come from the operator's .env.
      AWS_REGION: "${AWS_REGION:-}"
      AWS_PROFILE: "${AWS_PROFILE:-}"
      PANOPTES_ASSUME_ROLE_ARN: "${PANOPTES_ASSUME_ROLE_ARN:-}"
      PANOPTES_EXTERNAL_ID: "${PANOPTES_EXTERNAL_ID:-}"
      SENTRY_ORG: "${SENTRY_ORG:-}"
      SENTRY_PROJECT: "${SENTRY_PROJECT:-}"
      SENTRY_TOKEN: "${SENTRY_TOKEN:-}"
      DEV_HEALTH_URL: "${DEV_HEALTH_URL:-}"
      CONSUMER_PACK_DIR: "${CONSUMER_PACK_DIR}"
    # Clean entrypoint — core is importable from the baked image, no pip preamble.
    command: ["python", "-m", "core.collector", "--config", "/packs/consumer/panoptes.yaml"]
    restart: unless-stopped

  mcp:
    # Same baked image as collector (see Dockerfile).
    <<: *panoptes-build
    depends_on:
      - victoriametrics
    # The MCP stdio server. stdin_open + tty keep stdio attachable for a local MCP
    # client; it reads PANOPTES_CONFIG + PANOPTES_CONSUMER_PACK (a FILE PATH) from env.
    stdin_open: true
    tty: true
    # Only the consumer pack is mounted now — core code lives in the image.
    volumes:
      - ${CONSUMER_PACK_DIR:?Set CONSUMER_PACK_DIR (see .env.example)}:/packs/consumer:ro
    environment:
      PANOPTES_CONFIG: "/packs/consumer/panoptes.yaml"
      # The consumer pack is mounted as a single importable file; the server loads it
      # via importlib.util.spec_from_file_location (spec § Consumer-pack loading).
      PANOPTES_CONSUMER_PACK: "/packs/consumer/pack.py"
      AWS_REGION: "${AWS_REGION:-}"
      AWS_PROFILE: "${AWS_PROFILE:-}"
      PANOPTES_ASSUME_ROLE_ARN: "${PANOPTES_ASSUME_ROLE_ARN:-}"
      PANOPTES_EXTERNAL_ID: "${PANOPTES_EXTERNAL_ID:-}"
      SENTRY_ORG: "${SENTRY_ORG:-}"
      SENTRY_PROJECT: "${SENTRY_PROJECT:-}"
      SENTRY_TOKEN: "${SENTRY_TOKEN:-}"
      DEV_HEALTH_URL: "${DEV_HEALTH_URL:-}"
      CONSUMER_PACK_DIR: "${CONSUMER_PACK_DIR}"
    # The MCP stdio server's main() self-registers the core adapters (via
    # core.bootstrap) before resolving PANOPTES_CONFIG, so the config's real `type`
    # fields build cleanly. Reads PANOPTES_CONFIG + PANOPTES_CONSUMER_PACK from env.
    command: ["python", "-m", "core.mcp.server"]
    restart: unless-stopped

volumes:
  vm-data:
