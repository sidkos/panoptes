# The fleet consumer-pack reference config (v0.3 — the genericity proof's consumer #1).
#
# This is the shape a generic game-server-fleet platform deploys: a single `fleet` source
# (the consumer source registered by this pack's `pack.py`, which BUILDS ON the core
# `prometheus` source) feeding a Fleet dashboard + the `get_fleet_health` MCP tool. The
# injected `fleet` source type is available because `PANOPTES_CONSUMER_PACK` / the mounted
# pack dir imports `pack.py`, which registers it on the core SOURCES registry — a consumer
# extending a core plane WITHOUT a core change.
#
# Every endpoint/secret is `${VAR}`-interpolated from the process environment — never
# inlined. `dev` is live; `stage`/`prod` are wired-but-inert (`enabled: false`).
panoptes:
  environments:
    dev:
      enabled: true
      sources:
        # The consumer `fleet` source — registered by this pack, composes core prometheus.
        # It needs only the upstream Prometheus endpoint + env; the source fixes which
        # Agones series it scrapes and relabels them into `panoptes_fleet_*` gauges.
        - type: fleet
          url: ${FLEET_PROMETHEUS_URL}
          env: dev
    stage:
      enabled: false
      sources: []
    prod:
      enabled: false
      sources: []
  store:
    type: victoriametrics
    # The in-network hostname MUST match the docker-compose service name.
    url: http://victoriametrics:8428
    retention: 15d
  notifiers:
    - type: logging
  dashboards:
    provider: grafana
    env_variable: true
    # Core packs the operator also ships; the consumer's Fleet dashboard rides in via the
    # consumer_pack path below (globbed from `dashboards/fleet/`).
    core_packs: [overview]
    consumer_pack:
      path: ${CONSUMER_PACK_DIR}   # mounted at /packs/consumer (this fleet pack dir)
  slos:
    - name: fleet-readiness
      objective: 0.99
  mcp:
    transport: stdio
    # The core read-only tools the operator exposes; the consumer's `get_fleet_health`
    # is added at runtime by this pack's `register_tools` hook (not listed here).
    tools: [describe_signal_catalog, list_dashboards, get_dashboard_data,
            query_metric, search_incidents, search_logs, describe_health]
