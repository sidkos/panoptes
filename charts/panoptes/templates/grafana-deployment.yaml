{{- /*
The Grafana Deployment — the read-only dashboard face.

Mounts the dashboard provisioning + dashboard JSON via ConfigMap volumes (the core +
injected packs the collector's store backs). Grafana reads the VictoriaMetrics store
(ClusterIP, in-cluster) as its datasource. It is reached only through the gated nginx
ingress (its Service is ClusterIP) — no anonymous public path.
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "panoptes.fullname" . }}-grafana
  labels:
    {{- include "panoptes.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "panoptes.name" . }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "panoptes.name" . }}
        app.kubernetes.io/component: grafana
    spec:
      # Grafana reaches the in-cluster VM store over HTTP — it needs no K8s API token, so the
      # SA token is NOT automounted (token blast-radius reduction).
      automountServiceAccountToken: false
      securityContext:
        {{- include "panoptes.podSecurityContext" . | nindent 8 }}
      containers:
        - name: grafana
          image: {{ .Values.grafana.image | quote }}
          # Base container hardening (drop ALL caps + no privilege escalation). NOTE:
          # `readOnlyRootFilesystem` is intentionally NOT set here — grafana writes to its
          # data dir (/var/lib/grafana); the provisioning + dashboards mounts below are the
          # only injected paths and they are ConfigMap-backed (read-only by nature).
          securityContext:
            {{- include "panoptes.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            # The dashboard provisioning config + the dashboard JSON, mounted from ConfigMaps.
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: provisioning
          configMap:
            name: {{ include "panoptes.fullname" . }}-grafana-provisioning
        - name: dashboards
          configMap:
            name: {{ include "panoptes.fullname" . }}-grafana-dashboards
---
# The provisioning + dashboards ConfigMaps the Grafana pod mounts. The provisioning
# ConfigMap declares the file provider; the dashboards ConfigMap carries the (release-time
# synced) dashboard JSON. Both are rendered here so the chart is self-contained.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "panoptes.fullname" . }}-grafana-provisioning
  labels:
    {{- include "panoptes.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  panoptes.yaml: |
    apiVersion: 1
    providers:
      - name: panoptes
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "panoptes.fullname" . }}-grafana-dashboards
  labels:
    {{- include "panoptes.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  # The dashboard JSON is synced into this ConfigMap at release time (the core + injected
  # packs); left as a placeholder key here so the ConfigMap renders schema-clean offline.
  .keep: ""
