{{- /*
The collector + MCP ServiceAccount.

Phase-0 SKELETON: this single, trivial ServiceAccount is the whole chart's render
surface for now, so the hermetic `helm lint` + `helm template | kubeconform -strict`
gate validates a real (schema-checked) manifest. Phase 7 adds the IRSA annotation's
real value (the home read-role), the workload Deployments/StatefulSet, the ClusterIP
Services, and the nginx forward-auth Ingress that this SA's pods run under.

The `eks.amazonaws.com/role-arn` annotation is emitted ONLY when an IRSA role ARN is
supplied, so the skeleton render (empty ARN) stays schema-clean while the Phase-7
fixture exercises the annotated path.
*/ -}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "panoptes.serviceAccountName" . }}
  labels:
    {{- include "panoptes.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.irsaRoleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ . | quote }}
  {{- end }}
{{- end -}}
