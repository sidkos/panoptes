{{- /*
The collector + MCP ServiceAccounts (IRSA-annotated).

Each SA carries `eks.amazonaws.com/role-arn = .Values.irsaRoleArn` (the Terraform module's
`irsa_role_arn` output), so its pods assume the SA-scoped IRSA role via the projected SA
token — the ONLY credential path (no mounted static keys). The SA NAMES are FIXED
(`panoptes-collector` / `panoptes-mcp`) so they match the IRSA trust subjects the Phase-6
module pins (`system:serviceaccount:panoptes:<sa>`) — a release-prefixed name would break
the OIDC `:sub` StringEquals scoping and the pods would be denied the role.

The annotation is emitted ONLY when an IRSA role ARN is supplied, so an ARN-less render
stays schema-clean; the CI fixture supplies a non-live ARN so the annotated path is checked.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "panoptes.collectorServiceAccountName" . }}
  labels:
    {{- include "panoptes.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector
  {{- with .Values.irsaRoleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ . | quote }}
  {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "panoptes.mcpServiceAccountName" . }}
  labels:
    {{- include "panoptes.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
  {{- with .Values.irsaRoleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ . | quote }}
  {{- end }}
