name: 🔍 CI
on:
  pull_request: { branches: [main] }
  push: { branches: [main] }
  workflow_dispatch:
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
permissions: { contents: read }
jobs:
  changes:                         # dorny/paths-filter: skip integration for docs-only
    runs-on: ubuntu-latest
    # Block style (NOT a `{ ... }` flow mapping): an unquoted `${{ }}` expression
    # inside a YAML flow mapping is invalid YAML (the `{{` reads as a nested map) and
    # GitHub rejects the whole workflow at validation. Block style avoids the trap.
    outputs:
      code: ${{ steps.f.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            code:
              - 'core/**'
              - 'examples/**'
              - 'tests/**'
              - 'docker-compose.yml'
              - 'pyproject.toml'
              - 'modules/**'
              - 'deploy/**'
              - 'charts/**'
              - 'Dockerfile'
  ci:
    needs: changes
    uses: ./.github/workflows/ci-checks.yml
    with:
      run-integration: ${{ needs.changes.outputs.code == 'true' }}
  merge-gatekeeper:
    name: 🚪 Merge Gatekeeper
    needs: [ci]
    if: ${{ always() }}              # run even when ci failed, so this is a real red check, not a skip
    runs-on: ubuntu-latest
    steps:
      - run: |
          if ${{ contains(needs.*.result, 'failure') }}; then
            echo "A required check failed."; exit 1
          fi
          echo "All checks passed."
