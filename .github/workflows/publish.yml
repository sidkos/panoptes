name: 📦 Publish (GHCR)
# Tag-triggered GHCR build + push (spec § CI/CD New publish workflow). On a `v0.2.*`
# version tag this builds the existing Dockerfile and pushes
# `ghcr.io/sidkos/panoptes:<version>` + `:latest`. The immutable-tag discipline is
# load-bearing: the Helm `values.image.tag` + the Terraform `image_tag` pin the version
# tag, never a moving ref (Risk K11). `packages: write` is scoped to the publish job ONLY
# (the single CI write permission in the whole repo); the top-level grant stays read-only.
# `workflow_dispatch` is retained for a manual cache-warming dry run (build only, no push —
# there is no tag to publish on a manual run).
on:
  push:
    tags: ['v0.2.*']
  workflow_dispatch:

# Top-level permissions are read-only; the write grant is job-scoped below so no other
# job (now or later) inherits package-write.
permissions: { contents: read }

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-image:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    # packages:write is granted to THIS job only — the sole CI write permission.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      # Buildx gives a reproducible, cache-aware build of the existing Dockerfile.
      - uses: docker/setup-buildx-action@v3
      # Derive the immutable image tags from the git tag. `docker/metadata-action`
      # emits `ghcr.io/sidkos/panoptes:<version>` (+ `:latest` on a semver tag);
      # the consumer Helm values / Terraform `image_tag` pin the version tag, never
      # `:latest` (Risk K11 — no moving-ref drift into the cluster).
      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/sidkos/panoptes
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
      # Log in to GHCR with the job-scoped GITHUB_TOKEN (packages:write). The tag guard is
      # the final behavior, not a placeholder: a `workflow_dispatch` (manual) run has no tag
      # to publish, so login + push are correctly skipped and only the cache-warming build
      # runs; the real publish fires only on a `v0.2.*` tag push.
      - name: Log in to GHCR
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (and push on a version tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
