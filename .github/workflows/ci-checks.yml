name: '🛠️ CI Checks'
on:
  workflow_call:
    inputs:
      run-integration: { type: boolean, default: false }
permissions: { contents: read }
jobs:
  lint-type:                       # ruff lint + format-check + mypy --strict
    name: 🐍 Lint & Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-panoptes
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy --strict .
      # YAML lint runs after the Python gate. yamllint is installed via the
      # `.[dev]` extra in setup-panoptes, so it is on PATH here.
      - run: yamllint .
      # actionlint catches GitHub-Actions-specific defects that yamllint cannot — the
      # `${{ }}`-in-flow-mapping bug class that previously broke CI, deprecated action
      # node versions, and shellcheck of every `run:` block. Pinned download-and-run
      # (no marketplace action pull); the script fetches the matching release binary.
      - name: actionlint (workflow static analysis)
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) 1.7.7
          ./actionlint -color

  unit:                            # fast; the coverage gate
    name: 🧪 Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-panoptes
      # Global floor measures core only. examples/ is a test fixture (the demo
      # pack), not shipped core — excluded from the global gate so a fixture
      # coverage dip can neither mask nor inflate the core number.
      - run: pytest -m "not integration and not terraform and not helm" --cov=core --cov-fail-under=85
      # Authoritative per-package floor (spec § Tests Coverage mandate): the two
      # areas the design docs single out. This INTENTIONALLY re-executes the full
      # unit suite a second time to recompute coverage scoped to core.sources +
      # core.mcp; --cov-append keeps the second run from re-clobbering the first
      # run's .coverage data file. The scoped percentage is therefore measured over
      # the union of both runs' data (i.e. all unit tests touching those packages),
      # not only sources/mcp-specific tests — this is expected. Trade-off accepted:
      # the second full run roughly doubles unit-job wall time AND doubles the flake
      # exposure of any nondeterministic unit test (so unit tests MUST be strictly
      # deterministic — they are, given respx/botocore.stub everywhere) but keeps a
      # single obvious gate command. Do NOT "optimize" it into a `coverage report
      # --include=` post-step without re-verifying both floors still gate
      # (`coverage combine` + two scoped `coverage report --include=` is the
      # documented v0.2 optimization; the spec warns against doing it in v0.1).
      - run: pytest -m "not integration and not terraform and not helm" --cov=core.sources --cov=core.mcp --cov-append --cov-fail-under=80

  guards:                          # the standalone-purity invariants
    name: 🛡️ Boundary Guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-panoptes
      - run: pytest tests/unit/test_core_purity_guard.py tests/unit/test_no_write_actions_guard.py

  terraform:                       # hermetic IaC gate — no AWS creds, no backend, no plan
    name: 🌱 Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pinned setup actions (per the spec's tool-install contract). The terraform
      # wrapper is disabled so `subprocess` calls in the marked tests see real exit
      # codes rather than the action's stdout-wrapping shim.
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: '1.9.8', terraform_wrapper: false }
      - uses: terraform-linters/setup-tflint@v4
        with: { tflint_version: 'v0.53.0' }
      # The hermetic pipeline (spec § CI/CD `terraform` job, Risk K3): fmt-check, a
      # no-backend init+validate (offline — NO state, NO provider auth, NO `plan`),
      # then tflint. No AWS credentials are configured anywhere in this job.
      - run: terraform -chdir=modules/stack fmt -check -recursive
      - run: terraform -chdir=modules/stack init -backend=false -input=false
      - run: terraform -chdir=modules/stack validate
      - run: tflint --chdir=modules/stack
      # Python venv for the marked plan-assertion test (extended in Phase 6). Selecting
      # `-m terraform` runs ONLY the marked IaC tests against the just-validated module.
      - uses: ./.github/actions/setup-panoptes
      # Anti-rot floor for the SECURITY-CORE terraform suite (mirrors the integration job's
      # collect-count guard): a future marker-loss / file-rename could make the whole
      # plan-assertion + IRSA-scoping suite vacuous-by-omission (collect 0, exit 0, green).
      # Assert the marked set still collects at least its floor BEFORE running it.
      - name: Assert terraform suite collects >= 15 tests (anti-rot floor)
        run: |
          # pytest -q prints "N tests collected" or, when deselecting, "N/M tests
          # collected"; match the LEADING count in both forms.
          summary=$(pytest -m terraform --collect-only -q 2>/dev/null \
            | grep -Eo '[0-9]+(/[0-9]+)? tests? collected' || true)
          collected=$(printf '%s' "${summary}" | grep -Eo '^[0-9]+' || echo 0)
          echo "Collected ${collected} terraform test(s)."
          if [ "${collected}" -lt 15 ]; then
            echo "::error::Terraform anti-rot floor: expected >= 15, collected ${collected}."
            exit 1
          fi
      - run: pytest -m terraform

  helm:                            # hermetic chart gate — offline schema validation, no cluster
    name: ⎈ Helm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
        with: { version: 'v3.16.2' }
      # kubeconform is fetched from a pinned release tarball (no marketplace action), then
      # `helm template | kubeconform -strict` validates the rendered manifests' schema
      # fully OFFLINE — never a `kubectl apply --dry-run=server` (that needs a cluster).
      - name: Install kubeconform (pinned)
        run: |
          curl -fsSL -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform
          rm -f kubeconform.tar.gz kubeconform
      - run: helm lint charts/panoptes
      - run: helm template charts/panoptes -f charts/panoptes/ci/test-values.yaml | kubeconform -strict -summary
      # Python venv for the marked render-assertion test (extended in Phase 7). Selecting
      # `-m helm` runs ONLY the marked chart tests against the just-validated chart.
      - uses: ./.github/actions/setup-panoptes
      - run: pytest -m helm

  integration:                     # compose/testcontainers; marker-gated, opt-in
    name: 🐳 Integration (compose)
    if: ${{ inputs.run-integration }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-panoptes
      # Phase-8 re-tightened gate (spec § Rollout Phases Phase 8 exit criteria —
      # BOTH halves, not a choice):
      #   (a) the prior `|| [ $? -eq 5 ]` exit-code-5 tolerance is REMOVED, so an
      #       empty integration collection (exit 5) is a real failure again and the
      #       gate cannot rot to always-green; and
      #   (b) an explicit minimum-collected-count assertion: `pytest -m integration`
      #       must collect >= 5 tests (keyed to the ASSERTION count — collector-to-VM,
      #       grafana-provisioning, and the three separate test_mcp_stdio_e2e
      #       functions), so neither an empty collection nor a quiet
      #       file-consolidation can silently shrink the suite under the floor.
      #
      # Mechanism chosen for (b): a `--collect-only -q` count step (parsed for the
      # "N tests collected" summary). This is the authoritative anti-rot guard and
      # runs WITHOUT Docker, so a collection regression red-bars fast and clearly,
      # before the slower container run. (The same floor is ALSO enforced in-suite by
      # tests/integration/conftest.py::pytest_collection_modifyitems as defense in
      # depth — belt and suspenders; either tripping fails the job.)
      - name: Assert integration suite collects >= 5 tests (anti-rot floor)
        run: |
          # pytest -q prints either "N tests collected" or, when deselecting,
          # "N/M tests collected"; match the LEADING count in both forms.
          summary=$(pytest -m integration --collect-only -q 2>/dev/null \
            | grep -Eo '[0-9]+(/[0-9]+)? tests? collected' || true)
          collected=$(printf '%s' "${summary}" | grep -Eo '^[0-9]+' || echo 0)
          echo "Collected ${collected} integration test(s)."
          if [ "${collected}" -lt 5 ]; then
            echo "::error::Integration anti-rot floor: expected >= 5, collected ${collected}."
            exit 1
          fi
      # The real run — exit-5 tolerance REMOVED; testcontainers spins VM+Grafana
      # (Docker is preinstalled on ubuntu-latest).
      - run: pytest -m integration
